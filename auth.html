<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In / Sign Up | SkillBarter</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">SkillBarter</a>
            <div class="nav-links">
                <a href="dashboard.html">Find Matches</a>
                <a href="auth.html" class="btn btn-outline" style="border: none; padding: 0;">Log In</a>
            </div>
        </div>
    </nav>

    <div class="container auth-wrapper">
        <div class="card auth-card">
            <div class="auth-header">
                <h2>Welcome to SkillBarter</h2>
                <p>Join the community and start exchanging skills.</p>
            </div>
            
            <form action="profile.html">
                <div class="form-group">
                    <label class="form-label">Email Context (Mockup)</label>
                    <input type="email" class="form-control" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Continue</button>
                
                <p style="text-align: center; margin-top: 1.5rem; margin-bottom: 0;">
                    <a href="profile.html">Demo: Go directly to Profile Setup</a>
                </p>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
